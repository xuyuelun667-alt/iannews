name: Scrape News
on:
  schedule:
    - cron: '0 8 */2 * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests deep-translator

      - name: Run scraper
        run: python scripts/scrape.py

      - name: Commit & push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: update news"
          commit_user_name: iannews-bot
          commit_user_email: bot@iannews.cc
          file_pattern: data/news.json
