name: Scrape Twitter News
on:
  schedule:
    # 每隔一天，北京时间 16:00 (UTC 08:00)
    - cron: '0 8 */2 * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          X_API_BEARER: ${{ secrets.X_API_BEARER }}
        run: python scripts/scrape.py

      - name: Commit & push updated news
        run: |
          git config user.name "iannews-bot"
          git config user.email "bot@example.com"
          git add data/news.json
          git diff --staged --quiet || git commit -m "auto: update news $(date +%Y-%m-%d)"
          git pull --rebase
          git push
